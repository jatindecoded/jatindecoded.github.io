<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whatsapp Conversation</title>
    <link rel="icon" href="/favicon.png?" type="image" sizes="16x16">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
  </head>

  <style>
    * {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    }

    * {
        box-sizing: border-box;
      }

    input[type="text"],
    input[type="password"] {
      padding: 12px;
      border: 1px solid rgba(199, 199, 199, 0.377);
      border-radius: 40px;
      margin-top: 5px;
      margin-bottom: 5px;
      width: 300px;
      font-size: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-weight: 300;
      color: rgb(114, 114, 114);
      /* text-align: center; */
    }

    input[type="text"]::placeholder {
      font-size: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-weight: 300;
      color: rgb(114, 114, 114);
      opacity: 0.25;
    }

    .para {
      color: #00c2a4;
      font-size: 32px;
      line-height: 38px;
      margin-bottom: 30px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-weight: 300;
    }

    img {
      display: block;
      margin-right: auto;
      margin-left: auto;
    }

    .navbar {
      padding-top: 27px;
      padding-bottom: 27px;
      border-width: 0px;
      background-color: #1ebea5;
      overflow: hidden;
    }

    body {
      margin: 0px;
    }

    .maindata {
      position: absolute;
      top: 50%;
      left: 50%;
      -moz-transform: translateX(-50%) translateY(-50%);
      -webkit-transform: translateX(-50%) translateY(-50%);
      transform: translateX(-50%) translateY(-50%);
    }

    /* #button,
    #button:hover,
    #button:visited {
      border-radius: 5px;
      display: inline-block;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      font-weight: 300;
      height: 19px;
      letter-spacing: 0.02em;
      line-height: 19px;
      padding-top: 10px;
      padding-bottom: 10px;
      white-space: nowrap;
      background-color: #01e675;
      color: #fff !important;
      border: none;
    } */



    #button,
    #button:visited {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.7px;
      text-decoration: none;
      border-radius: 5px;
      padding: 20px 30px;
      margin: 30px;
      background-color: #01e675;
      border: none;
    }
  </style>
  <body>
    <div class="navbar">
      <img src="/whatsapp.svg" alt="Whatsapp" />
    </div>

    <center>
      <div class="maindata">
        <div class="mid">
          <p class="para">Start texting by entering a number...</p>
          <input type="text" id="phone" placeholder="Type a number..." />
          <script>
            var input = document.getElementById("phone");

            function whatsapp() {
              window.location = "//wa.me/91" + input.value;
            }
          </script>

          <script>
            var input = document.getElementById("phone");
            input.addEventListener("keyup", function (event) {
              if (event.keyCode === 13) {
                event.preventDefault();
                document.getElementById("button").click();
              }
            });
          </script>
          <script language="javascript" type="text/javascript">
            //script for onblur
            var spaces = document.getElementById("phone");

            function removeSpaces(string) {
              return string.split(" ").join("");
            }
          </script>

          <script language="javascript" type="text/javascript">
            //script for onblur via enter
            var spaces = document.getElementById("phone");

            function removeSpacesEnter(string) {
              return string.split(" ").join("");
            }
          </script>
        </div>
        <br />
        <button
          onclick="phone.value=removeSpacesEnter(phone.value); whatsapp()"
          id="button"
        >
          CONTINUE TO CHAT
        </button>

        <!-- <button onclick="phone.value=removeSpacesEnter(phone.value)" id="button">
    Remove Spaces
</button> -->
      </div>
    </center>
  </body>
  <script>
    const phoneInputField = document.querySelector("#phone");
    // const phoneInput = window.intlTelInput(phoneInputField, {
    //   utilsScript:
    //     "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    // });
    const phoneInput = window.intlTelInput(phoneInputField, {
      preferredCountries: ["in", "us", "co", "de"],
      utilsScript:
        "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });
  </script>
</html>
